    <script>
        const questions = [
            { q: "Câu 1: Cho hàm số $y=3x^{2}$. Khi $x=2$ giá trị của $y$ là:", a: ["6", "12", "36", "18"], c: 1, e: "<b>Bước 1:</b> Thay $x=2$ vào hàm số $y=3x^2$.<br><b>Bước 2:</b> Ta có $y = 3 \\cdot (2)^{2} = 3 \\cdot 4 = 12$.<br><b>Kết luận:</b> Đáp án đúng là 12." },
            { q: "Câu 2: Trong các điểm sau, điểm nào thuộc đồ thị hàm số $y=-2x^{2}$?", a: ["$(1; 2)$", "$(-1; 2)$", "$(1; -2)$", "$(2; -4)$"], c: 2, e: "<b>Bước 1:</b> Thử điểm $(1; -2)$, thay $x=1$ vào hàm số.<br><b>Bước 2:</b> $y = -2 \\cdot (1)^{2} = -2$.<br><b>Bước 3:</b> Vì giá trị $y$ tính ra đúng bằng tung độ của điểm nên điểm $(1; -2)$ thuộc đồ thị." },
            { q: "Câu 3: Cho hàm số $y=ax^{2}$ đi qua điểm $(2; 2)$. Hệ số $a$ là:", a: ["$a=1$", "$a=\\frac{1}{2}$", "$a=2$", "$a=-\\frac{1}{2}$"], c: 1, e: "<b>Bước 1:</b> Thay $x=2, y=2$ vào $y=ax^2$.<br><b>Bước 2:</b> $2 = a \\cdot 2^{2} \\Rightarrow 2 = 4a$.<br><b>Bước 3:</b> Giải ra $a = \\frac{2}{4} = \\frac{1}{2}$." },
            { q: "Câu 4: Với giá trị nào của $x$ thì hàm số $y=\\frac{1}{2}x^{2}$ có giá trị bằng 8?", a: ["$x=4$", "$x=16$", "$x=\\pm 4$", "$x=2$"], c: 2, e: "<b>Bước 1:</b> Thiết lập phương trình: $\\frac{1}{2}x^{2} = 8$.<br><b>Bước 2:</b> Nhân cả hai vế với 2: $x^{2} = 16$.<br><b>Bước 3:</b> Lấy căn bậc hai: $x = \\pm 4$." },
            { q: "Câu 5: Vật rơi tự do có quãng đường $s=5t^{2}$. Sau bao lâu vật rơi được 20m?", a: ["4 giây", "2 giây", "100 giây", "1 giây"], c: 1, e: "<b>Bước 1:</b> Thay $s=20$ vào công thức: $20 = 5t^{2}$.<br><b>Bước 2:</b> Chia cho 5: $t^{2} = 4$.<br><b>Bước 3:</b> Vì thời gian $t > 0$ nên $t = 2$ giây." },
            { q: "Câu 6: Đồ thị hàm số $y=ax^{2}$ ($a \\neq 0$) là một đường:", a: ["Đường thẳng", "Đường tròn", "Parabol", "Hyperbol"], c: 2, e: "Theo định nghĩa SGK, đồ thị hàm số bậc hai $y=ax^2$ có dạng đường Parabol nhận trục tung làm trục đối xứng." },
            { q: "Câu 7: Nếu $a < 0$, đồ thị hàm số $y=ax^{2}$ nằm ở đâu?", a: ["Phía trên trục hoành", "Phía dưới trục hoành", "Bên trái trục tung", "Bên phải trục tung"], c: 1, e: "Khi $a < 0$, vì $x^2 \\ge 0$ nên $y = ax^2 \\le 0$. Do đó mọi điểm của đồ thị đều có tung độ không dương, nằm phía dưới trục hoành." },
            { q: "Câu 8: Đồ thị hàm số $y=\\frac{1}{2}x^{2}$ đi qua điểm nào?", a: ["$M(1; 2)$", "$N(2; 1)$", "$P(-2; 2)$", "$Q(2; 4)$"], c: 2, e: "Thay $x=-2$: $y = \\frac{1}{2} \\cdot (-2)^{2} = \\frac{1}{2} \\cdot 4 = 2$. Vậy điểm đó là $P(-2; 2)$." },
            { q: "Câu 9: Hàm số $y=ax^{2}$ đi qua $A(-1; 3)$. Hệ số $a$ là:", a: ["$3$", "$-3$", "$1$", "$\\frac{1}{3}$"], c: 0, e: "Thay $x=-1, y=3$: $3 = a \\cdot (-1)^{2} \\Rightarrow 3 = a \\cdot 1 \\Rightarrow a = 3$." },
            { q: "Câu 10: Số giao điểm của $y=x^{2}$ và $y=2x+3$ là:", a: ["0", "1", "2", "3"], c: 2, e: "Xét PT hoành độ: $x^2 - 2x - 3 = 0$. Có $a-b+c = 1 - (-2) + (-3) = 0$. PT có 2 nghiệm phân biệt nên có 2 giao điểm." },
            // (Từ đây là các câu bổ sung cho đủ 46 câu)
            { q: "Câu 11: Phương trình nào sau đây là phương trình bậc hai một ẩn?", a: ["$2x+1=0$", "$x^2-5x+4=0$", "$x^3+x^2=0$", "$\\frac{1}{x^2}+x=2$"], c: 1, e: "Phương trình bậc hai một ẩn có dạng $ax^2 + bx + c = 0$ ($a \\neq 0$)." },
            { q: "Câu 12: Hệ số $b$ của phương trình $x^2 - 7x + 10 = 0$ là:", a: ["$1$", "$-7$", "$10$", "$7$"], c: 1, e: "Đối chiếu với dạng $ax^2 + bx + c = 0$, ta thấy $b = -7$." },
            { q: "Câu 13: Biệt thức $\\Delta$ (Delta) được tính theo công thức:", a: ["$b^2-ac$", "$b^2-4ac$", "$b-4ac$", "$b^2+4ac$"], c: 1, e: "Công thức chuẩn là $\\Delta = b^2 - 4ac$." },
            { q: "Câu 14: Phương trình có nghiệm kép khi:", a: ["$\\Delta > 0$", "$\\Delta < 0$", "$\\Delta = 0$", "$\\Delta \\ge 0$"], c: 2, e: "Khi $\\Delta = 0$, phương trình bậc hai có nghiệm kép $x_1 = x_2 = -\\frac{b}{2a}$." },
            { q: "Câu 15: Giải phương trình $x^2 - 9 = 0$:", a: ["$x=3$", "$x=-3$", "$x=\\pm 3$", "$x=81$"], c: 2, e: "$x^2 = 9 \\Rightarrow x = \\pm \\sqrt{9} = \\pm 3$." },
            { q: "Câu 16: Phương trình $x^2 + x + 1 = 0$ có bao nhiêu nghiệm?", a: ["0", "1", "2", "Vô số"], c: 0, e: "$\\Delta = 1^2 - 4(1)(1) = -3 < 0$. Do đó phương trình vô nghiệm." },
            { q: "Câu 17: Theo định lý Vi-ét, tích hai nghiệm $P = x_1 \\cdot x_2$ bằng:", a: ["$-\\frac{b}{a}$", "$\\frac{c}{a}$", "$\\frac{b}{a}$", "$-\\frac{c}{a}$"], c: 1, e: "Định lý Vi-ét: $S = -\\frac{b}{a}$ và $P = \\frac{c}{a}$." },
            { q: "Câu 18: Nhẩm nghiệm PT $x^2 - 5x + 6 = 0$:", a: ["1; 4", "2; 3", "-2; -3", "1; 6"], c: 1, e: "Tổng $S=5$, Tích $P=6$. Hai số đó là 2 và 3." },
            { q: "Câu 19: Nếu $a+b+c=0$ thì PT $ax^2+bx+c=0$ có nghiệm là:", a: ["$1; \\frac{c}{a}$", "$-1; -\\frac{c}{a}$", "$1; -\\frac{c}{a}$", "$-1; \\frac{c}{a}$"], c: 0, e: "Đây là quy tắc nhẩm nghiệm đặc biệt khi tổng các hệ số bằng 0." },
            { q: "Câu 20: Nếu $a-b+c=0$ thì PT $ax^2+bx+c=0$ có nghiệm là:", a: ["$1; \\frac{c}{a}$", "$-1; -\\frac{c}{a}$", "$1; -\\frac{c}{a}$", "$-1; \\frac{c}{a}$"], c: 1, e: "Đây là quy tắc nhẩm nghiệm khi $a-b+c=0$." },
            { q: "Câu 21: Cho phương trình $x^2 - 2x + m = 0$. Tìm $m$ để PT có nghiệm kép:", a: ["$m=0$", "$m=1$", "$m=-1$", "$m=2$"], c: 1, e: "$\\Delta' = (-1)^2 - m = 1 - m$. Để có nghiệm kép thì $1-m=0 \\Rightarrow m=1$." },
            { q: "Câu 22: Biểu thức $x_1^2 + x_2^2$ được biến đổi thành:", a: ["$(x_1+x_2)^2$", "$(x_1+x_2)^2 - 2x_1x_2$", "$(x_1+x_2)^2 + 2x_1x_2$", "$S^2 - 4P$"], c: 1, e: "Đây là hằng đẳng thức đáng nhớ biến đổi theo Tổng và Tích." },
            { q: "Câu 23: Hai số có tổng $S=7$, tích $P=12$ là nghiệm của PT nào?", a: ["$x^2+7x+12=0$", "$x^2-7x+12=0$", "$x^2-12x+7=0$", "$x^2+12x+7=0$"], c: 1, e: "Công thức: $x^2 - Sx + P = 0$." },
            { q: "Câu 24: Cho PT $x^2 - 4x + 1 = 0$. Tính $x_1 + x_2$:", a: ["$4$", "$-4$", "$1$", "$-1$"], c: 0, e: "$S = -\\frac{b}{a} = -\\frac{-4}{1} = 4$." },
            { q: "Câu 25: Cho PT $2x^2 - 5x + 2 = 0$. Tính $x_1 \\cdot x_2$:", a: ["$2.5$", "$-2.5$", "$1$", "$-1$"], c: 2, e: "$P = \\frac{c}{a} = \\frac{2}{2} = 1$." },
            { q: "Câu 26: Tìm hai số biết tổng bằng 10, tích bằng 21:", a: ["4; 6", "3; 7", "2; 8", "5; 5"], c: 1, e: "$x^2 - 10x + 21 = 0 \\Rightarrow (x-3)(x-7)=0$." },
            { q: "Câu 27: PT $x^2 - (m+1)x + m = 0$ luôn có một nghiệm là:", a: ["0", "1", "m", "-1"], c: 1, e: "Ta thấy $a+b+c = 1 - (m+1) + m = 1 - m - 1 + m = 0$. Nên có nghiệm $x=1$." },
            { q: "Câu 28: Một hình chữ nhật có chu vi 20m, diện tích $24m^2$. Kích thước là:", a: ["4m; 6m", "3m; 7m", "2m; 8m", "5m; 5m"], c: 0, e: "Tổng $S = 20/2 = 10$. Tích $P = 24$. Hai số là 4 và 6." },
            { q: "Câu 29: PT trùng phương $x^4 - 5x^2 + 4 = 0$ có bao nhiêu nghiệm?", a: ["1", "2", "3", "4"], c: 3, e: "Đặt $t=x^2 \\ge 0 \\Rightarrow t^2 - 5t + 4 = 0 \\Rightarrow t=1, t=4$. Với mỗi $t > 0$ cho 2 nghiệm $x$." },
            { q: "Câu 30: PT bậc hai $ax^2+bx+c=0$ vô nghiệm khi:", a: ["$b^2-4ac < 0$", "$b^2-4ac > 0$", "$b^2-4ac = 0$", "$b^2-ac < 0$"], c: 0, e: "Khi biệt thức Delta âm, phương trình không có nghiệm thực." },
            { q: "Câu 31: Tâm đường tròn nội tiếp tam giác là giao của:", a: ["3 đường cao", "3 đường trung trực", "3 đường phân giác trong", "3 đường trung tuyến"], c: 2, e: "Giao điểm 3 đường phân giác trong cách đều 3 cạnh của tam giác." },
            { q: "Câu 32: Tâm đường tròn ngoại tiếp tam giác là giao của:", a: ["3 đường cao", "3 đường trung trực", "3 đường phân giác", "3 đường trung tuyến"], c: 0, e: "Giao điểm 3 đường trung trực cách đều 3 đỉnh của tam giác." },
            { id: 33, q: "(HÌNH 33) Đường tròn nào là đường tròn nội tiếp tam giác ABC?", a: ["Hình a", "Hình b", "Hình c", "Hình d"], c: 3, isImg: true, imgPath: "images/cau33.png", e: "Đường tròn nội tiếp phải nằm hoàn toàn trong tam giác và chạm đúng 3 cạnh." },
            { id: 34, q: "(HÌNH 34) Đường tròn nào là đường tròn ngoại tiếp tam giác ABC?", a: ["Hình 1", "Hình 2", "Hình 3", "Hình 4"], c: 1, isImg: true, imgPath: "images/cau34.png", e: "Đường tròn ngoại tiếp phải đi qua cả 3 đỉnh A, B, C." },
            { q: "Câu 35: Một tứ giác nội tiếp đường tròn khi:", a: ["Có 4 cạnh bằng nhau", "Tổng hai góc đối bằng $180^{\\circ}$", "Có 4 góc bằng nhau", "Có hai góc bằng $90^{\\circ}$"], c: 1, e: "Dấu hiệu nhận biết: Tứ giác có tổng hai góc đối diện bằng 180 độ." },
            { q: "Câu 36: Hình nào luôn nội tiếp được đường tròn?", a: ["Hình thoi", "Hình bình hành", "Hình chữ nhật", "Hình thang"], c: 2, e: "Hình chữ nhật có tổng 2 góc đối = $90 + 90 = 180$ độ." },
            { q: "Câu 37: Cho tứ giác $ABCD$ nội tiếp, $\\widehat{A}=70^{\\circ}$. Tính $\\widehat{C}$:", a: ["$70^{\\circ}$", "$110^{\\circ}$", "$180^{\\circ}$", "$20^{\\circ}$"], c: 1, e: "$\\widehat{C} = 180^{\\circ} - \\widehat{A} = 180 - 70 = 110^{\\circ}$." },
            { q: "Câu 38: Góc nội tiếp chắn nửa đường tròn có số đo:", a: ["$60^{\\circ}$", "$90^{\\circ}$", "$180^{\\circ}$", "$45^{\\circ}$"], c: 1, e: "Định lý: Góc nội tiếp chắn nửa đường tròn là góc vuông." },
            { q: "Câu 39: Góc ở tâm có số đo bằng:", a: ["Nửa số đo cung bị chắn", "Số đo cung bị chắn", "Gấp đôi cung bị chắn", "90 độ"], c: 1, e: "Định nghĩa số đo góc ở tâm bằng chính số đo cung bị chắn." },
            { q: "Câu 40: Đường tròn tâm $O$ bán kính $R=5cm$. Dây cung lớn nhất dài:", a: ["$5cm$", "$10cm$", "$15cm$", "$20cm$"], c: 1, e: "Dây cung lớn nhất chính là đường kính $d = 2R = 10cm$." },
            { id: 41, q: "(HÌNH 41) Tứ giác ở hình nào là tứ giác nội tiếp?", a: ["Hình 1", "Hình 2", "Hình 3", "Hình 4"], c: 2, isImg: true, imgPath: "images/cau41.png", e: "Quan sát xem hình nào có cả 4 đỉnh nằm đúng trên đường tròn." },
            { q: "Câu 42: Diện tích hình tròn bán kính $R$ là:", a: ["$2\\pi R$", "$\\pi R^2$", "$\\pi d$", "$\\frac{4}{3}\\pi R^3$"], c: 1, e: "Công thức diện tích hình tròn là $S = \\pi R^2$." },
            { q: "Câu 43: Chu vi đường tròn (độ dài đường tròn) là:", a: ["$2\\pi R$", "$\\pi R^2$", "$\\pi R$", "$2\\pi R^2$"], c: 0, e: "Công thức chu vi là $C = 2\\pi R$ hoặc $C = \\pi d$." },
            { id: 44, q: "(HÌNH 44) Cho $\\widehat{DAO}=50^{\\circ}, \\widehat{OCD}=30^{\\circ}$. Tính $\\widehat{ABC}$:", a: ["$80^{\\circ}$", "$90^{\\circ}$", "$100^{\\circ}$", "$110^{\\circ}$"], c: 2, isImg: true, imgPath: "images/cau44.png", e: "<b>B1:</b> $\\widehat{ADC} = 50 + 30 = 80^{\\circ}$.<br><b>B2:</b> $ABCD$ nội tiếp nên $\\widehat{ABC} = 180 - 80 = 100^{\\circ}$." },
            { q: "Câu 45: Cho tam giác đều nội tiếp $(O; R)$. Cạnh tam giác bằng:", a: ["$R$", "$R\\sqrt{3}$", "$R\\sqrt{2}$", "$2R$"], c: 1, e: "Công thức cạnh tam giác đều nội tiếp là $a = R\\sqrt{3}$." },
            { q: "Câu 46: Hình vuông nội tiếp $(O; R)$ có cạnh bằng:", a: ["$R$", "$R\\sqrt{3}$", "$R\\sqrt{2}$", "$2R$"], c: 2, e: "Áp dụng Pytago cho tam giác vuông cân tạo bởi 2 bán kính và 1 cạnh: $a = R\\sqrt{2}$." }
        ];

        let cur = 0, score = 0, selected = null, state = 'check';

        // HÀM TẠO ÂM THANH
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'correct') { // Tiếng vỗ tay/thắng cuộc
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else { // Tiếng sai
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function showQ() {
            if (cur >= questions.length) { showResult(); return; }
            const q = questions[cur];
            selected = null; state = 'check';
            document.getElementById('progress-text').innerText = `Câu ${cur + 1} / ${questions.length}`;
            document.getElementById('question-text').innerHTML = q.q;
            document.getElementById('explain-box').classList.add('hidden');
            document.getElementById('btn-action').innerText = "Kiểm tra đáp án";
            document.getElementById('btn-action').disabled = true;

            const imgArea = document.getElementById('image-area');
            const dImg = document.getElementById('display-img');
            if(q.isImg) {
                imgArea.classList.remove('hidden');
                dImg.src = q.imgPath;
            } else { imgArea.classList.add('hidden'); }

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.a.forEach((t, i) => {
                const b = document.createElement('button');
                b.className = "option-btn p-5 rounded-2xl text-left font-bold";
                b.innerHTML = `<span class="text-blue-500 mr-3">${String.fromCharCode(65+i)}.</span> ${t}`;
                b.onclick = () => {
                    if(state === 'next') return;
                    selected = i;
                    document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('border-blue-600', 'bg-blue-50'));
                    b.classList.add('border-blue-600', 'bg-blue-50');
                    document.getElementById('btn-action').disabled = false;
                };
                list.appendChild(b);
            });
            MathJax.typesetPromise();
        }

        async function handleAction() {
            const q = questions[cur];
            if(state === 'check') {
                const btns = document.querySelectorAll('.option-btn');
                state = 'next';
                if(selected === q.c) {
                    btns[selected].classList.add('correct');
                    score++;
                    playSound('correct');
                } else {
                    btns[selected].classList.add('wrong');
                    btns[q.c].classList.add('correct');
                    playSound('wrong');
                }
                document.getElementById('score-badge').innerText = `Đúng: ${score}`;
                document.getElementById('explain-content').innerHTML = q.e;
                document.getElementById('explain-box').classList.remove('hidden');
                document.getElementById('btn-action').innerText = "Tiếp theo";
                await MathJax.typesetPromise();
            } else {
                cur++;
                showQ();
            }
        }

        function showResult() {
            document.getElementById('main-card').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            document.getElementById('feedback-text').innerText = score >= 40 ? "Xuất sắc! Bạn đã nắm vững kiến thức." : "Khá tốt, hãy ôn lại các câu sai nhé!";
        }

        function resetQuiz() {
            cur = 0; score = 0;
            document.getElementById('score-badge').innerText = `Đúng: 0`;
            document.getElementById('main-card').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            showQ();
        }

        function confirmExit() {
            if(confirm("Bạn có muốn dừng lại và xem kết quả ngay không?")) showResult();
        }

        window.onload = showQ;
    </script>
</body>
</html>
